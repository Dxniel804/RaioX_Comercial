<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário — Dados do Cliente</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/forms.css') }}">
</head>
<body>
<!-- Logo VendaMais -->
<img src="{{ url_for('static', filename='img/logo__vm.png') }}" alt="VendaMais" class="logo-vendamais">

    <h1>Formulário — Dados do Cliente</h1>

    <form action="/forms" method="post">

        <h2><span>Dados de Identificação (obrigatórios)</span></h2>

        <div class="field-group">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>
        </div>

        <div class="field-group">
            <label for="cargo">Cargo</label>
            <input type="text" id="cargo" name="cargo" placeholder="Seu cargo">
        </div>

        <div class="field-group">
            <label for="empresa">Empresa</label>
            <input type="text" id="empresa" name="empresa" placeholder="Nome da empresa">
        </div>

        <div class="field-group">
            <label for="email">Email Corporativo</label>
            <input type="email" id="email" name="email" placeholder="seu@email.com.br" required>
        </div>

        <div class="field-group">
            <label for="telefone">Telefone ou WhatsApp</label>
            <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" required>
        </div>

        <div class="field-group">
            <label for="cidade">Cidade</label>
            <input type="text" id="cidade" name="cidade" placeholder="Sua cidade">
        </div>

        <div class="field-group">
            <label for="segmento_empresa">Segmento da Empresa</label>
            <input type="text" id="segmento_empresa" name="segmento_empresa" placeholder="Ex: Tecnologia, Varejo, Saúde…">
        </div>

        <div class="field-group">
            <label for="num_colaboradores">Número de Colaboradores</label>
            <input type="number" id="num_colaboradores" name="num_colaboradores" placeholder="Número aproximado">
        </div>

        <div class="field-group">
            <p>Faturamento anual aproximado</p>
            <div class="radio-group">
                <label class="radio-option">
                    <input type="radio" name="faturamento" value="ate_5m" required>
                    <span>Até R$ 5 milhões</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="faturamento" value="5_a_20m">
                    <span>R$ 5 a 20 milhões</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="faturamento" value="20_a_100m">
                    <span>R$ 20 a 100 milhões</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="faturamento" value="acima_100m">
                    <span>Acima de R$ 100 milhões</span>
                </label>
            </div>
        </div>

        <button type="submit">Enviar dados</button>

    </form>

</body>
</html>
