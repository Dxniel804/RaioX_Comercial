<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisando Diagnóstico</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/analisar.css') }}">
</head>
<body>
<!-- Logo VendaMais -->
<img src="{{ url_for('static', filename='img/logo__vm.png') }}" alt="VendaMais" class="logo-vendamais">
    <div class="container">
        <div class="loader">
            <div class="spinner"></div>
        </div>
        
        <h1>Analisando Seu Diagnóstico</h1>
        <p class="subtitle">Por favor, aguarde enquanto geramos sua análise personalizada...</p>
        
        <div class="steps">
            <div class="step active">
                <div class="step-icon">✓</div>
                <span>Dados Recebidos</span>
            </div>
            <div class="step">
                <div class="step-icon">⚙</div>
                <span>Gerando o Diagnóstico</span>
            </div>
            <div class="step">
                <div class="step-icon">📄</div>
                <span>Criando PDFs</span>
            </div>
            <div class="step">
                <div class="step-icon">✉</div>
                <span>Enviando Emails</span>
            </div>
        </div>

        <div class="info-text">
            <p>Não saia desta página. Você será redirecionado automaticamente quando a análise estiver pronta.</p>
        </div>
    </div>

    <script>
        // Atualizar os passos a cada 2 segundos
        let step = 0;
        const steps = document.querySelectorAll('.step');
        
        const stepInterval = setInterval(() => {
            step = (step + 1) % steps.length;
            
            steps.forEach((s, index) => {
                s.classList.remove('active');
                if (index <= step) {
                    s.classList.add('active');
                }
            });
        }, 2000);

        // Fazer a análise via AJAX
        async function iniciarAnalise() {
            try {
                const response = await fetch('/api/analisar', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    // Aguardar 1 segundo antes de redirecionar para melhor UX
                    setTimeout(() => {
                        window.location.href = '/sucesso';
                    }, 1000);
                } else {
                    clearInterval(stepInterval);
                    document.querySelector('.subtitle').textContent = 'Erro ao processar análise. Redirecionando...';
                    setTimeout(() => {
                        window.location.href = '/forms';
                    }, 3000);
                }
            } catch (error) {
                console.error('Erro:', error);
                clearInterval(stepInterval);
                document.querySelector('.subtitle').textContent = 'Erro ao processar. Redirecionando...';
                setTimeout(() => {
                    window.location.href = '/forms';
                }, 3000);
            }
        }

        // Iniciar análise quando a página carregar
        window.addEventListener('load', iniciarAnalise);
    </script>
</body>
</html>
