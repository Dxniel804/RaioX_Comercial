<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisando Diagnóstico</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/analisar.css') }}">
</head>
<body>
<!-- Logo VendaMais -->
<img src="{{ url_for('static', filename='img/logo__vm.png') }}" alt="VendaMais" class="logo-vendamais">
    <div class="container">
        <div class="loader">
            <div class="spinner"></div>
        </div>
        
        <h1>Analisando Seu Diagnóstico</h1>
        <p class="subtitle">Por favor, aguarde enquanto geramos sua análise personalizada...</p>
        
        <div class="steps">
            <div class="step active">
                <div class="step-icon">✓</div>
                <span>Dados Recebidos</span>
            </div>
            <div class="step">
                <div class="step-icon">⚙</div>
                <span>Gerando Diagnóstico</span>
            </div>
            <div class="step">
                <div class="step-icon">�</div>
                <span>Enviando por Email</span>
            </div>
        </div>

        <div class="info-text">
            <p>Não saia desta página. Você será redirecionado automaticamente quando a análise estiver pronta.</p>
        </div>
    </div>

    <script>
        // Atualizar os passos a cada 2 segundos
        let step = 0;
        const steps = document.querySelectorAll('.step');
        
        const stepInterval = setInterval(() => {
            step = Math.min(step + 1, steps.length - 1);
            
            steps.forEach((s, index) => {
                s.classList.remove('active');
                if (index <= step) {
                    s.classList.add('active');
                }
            });
            
            // Parar no último passo
            if (step >= steps.length - 1) {
                clearInterval(stepInterval);
            }
        }, 1500);

        // Fazer a análise via AJAX
        async function iniciarAnalise() {
            console.log('🚀 Iniciando análise...');
            
            try {
                const response = await fetch('/api/analisar', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                console.log('📡 Resposta recebida:', response.status);

                if (response.ok) {
                    const data = await response.json();
                    console.log('✅ Análise concluída:', data);
                    
                    // Iniciar processamento background para PDFs e emails
                    console.log('🔄 Iniciando processamento background...');
                    fetch('/api/processar_background', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        }
                    }).catch(error => {
                        console.log('⚠️ Erro no processamento background (não bloqueia):', error);
                    });
                    
                    // Aguardar 1 segundo antes de redirecionar para melhor UX
                    setTimeout(() => {
                        console.log('🔄 Redirecionando para sucesso...');
                        window.location.href = '/sucesso';
                    }, 1000);
                } else {
                    const errorData = await response.json();
                    console.error('❌ Erro na API:', errorData);
                    
                    clearInterval(stepInterval);
                    document.querySelector('.subtitle').textContent = `Erro: ${errorData.erro || 'Erro ao processar análise'}. Redirecionando...`;
                    
                    // Mostrar detalhes do erro no console
                    console.error('Status:', response.status);
                    console.error('Erro:', errorData);
                    
                    setTimeout(() => {
                        console.log('🔄 Redirecionando para forms devido a erro...');
                        window.location.href = '/forms';
                    }, 5000); // Aumentado para 5 segundos para permitir leitura do erro
                }
            } catch (error) {
                console.error('❌ Erro na requisição:', error);
                clearInterval(stepInterval);
                document.querySelector('.subtitle').textContent = 'Erro de conexão. Verifique sua internet e tente novamente. Redirecionando...';
                
                setTimeout(() => {
                    console.log('🔄 Redirecionando para forms devido a erro de conexão...');
                    window.location.href = '/forms';
                }, 5000);
            }
        }

        // Iniciar análise quando a página carregar
        window.addEventListener('load', iniciarAnalise);
    </script>
</body>
</html>
